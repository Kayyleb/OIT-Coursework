<HTML>
<SCRIPT LANGUAGE="JavaScript">
var a = parseInt(prompt("Please enter your a value:", ""));
var b = parseInt(prompt("Please enter your b value:", ""));
var c = parseInt(prompt("Please enter your c value:", ""));

var innerRoot = Math.sqrt((b * b) - (4 * a * c));
var r1 = (-b + innerRoot) / (2 * a);
var r2 = (-b - innerRoot) / (2 * a);

alert("Your roots are: " + r1 + " and " + r2);
</SCRIPT>
</HTML>
